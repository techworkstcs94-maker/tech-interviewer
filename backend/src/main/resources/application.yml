spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/msainterviewer}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        sslmode: require
        prepareThreshold: 0
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  cache:
    type: simple

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:myDefaultSecretKeyForDevelopmentOnlyNotForProduction12345678}
  expiration: 86400000

github:
  owner: ${GITHUB_OWNER:placeholder}
  repo: ${GITHUB_REPO:placeholder}
  token: ${GITHUB_TOKEN:placeholder}

webhook:
  secret: ${WEBHOOK_SECRET:dev-webhook-secret}

logging:
  level:
    com.assessment: DEBUG
    org.springframework.security: INFO
