spring:
  datasource:
    url: jdbc:h2:mem:msainterviewer;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
  flyway:
    enabled: false
  cache:
    type: simple

jwt:
  secret: local-dev-secret-key-at-least-32-chars-long
  expiration: 86400000

github:
  owner: placeholder
  repo: placeholder
  token: placeholder

webhook:
  secret: local-webhook-secret

logging:
  level:
    com.assessment: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
