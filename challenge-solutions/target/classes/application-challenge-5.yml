# The upstream service is not expected to be running locally.
# When unreachable the circuit breaker fires the fallback immediately.
# Point upstream.base-url at a real server to test the happy path.
upstream:
  base-url: http://localhost:9999
  timeout-ms: 3000

resilience4j:
  circuitbreaker:
    instances:
      productService:
        sliding-window-size: 10
        minimum-number-of-calls: 3
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        register-health-indicator: false
