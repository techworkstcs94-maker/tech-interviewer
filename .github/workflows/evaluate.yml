name: Evaluate Submission

on:
  workflow_dispatch:
    inputs:
      session_id:
        description: 'Candidate session ID'
        required: true
      challenge_id:
        description: 'Challenge number (1-6)'
        required: true
      candidate_code:
        description: 'Base64-encoded candidate Java code'
        required: true

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-

      - name: Inject candidate code
        run: |
          CHALLENGE_DIR="challenge-tests/challenge-${{ inputs.challenge_id }}"
          TARGET="${CHALLENGE_DIR}/src/main/java/com/assessment/CandidateSubmission.java"
          {
            echo "package com.assessment;"
            echo ""
            # Universal imports — available in ALL challenges via spring-boot-starter-web
            echo "import org.springframework.web.bind.annotation.*;"
            echo "import org.springframework.http.*;"
            echo "import org.springframework.stereotype.*;"
            echo "import org.springframework.beans.factory.annotation.*;"
            echo "import org.springframework.context.annotation.*;"
            echo "import org.springframework.web.context.request.*;"
            echo "import org.springframework.web.filter.*;"
            echo "import jakarta.servlet.*;"
            echo "import jakarta.servlet.http.*;"
            echo "import java.util.*;"
            echo "import java.util.stream.*;"
            echo "import java.util.function.*;"
            echo "import java.util.concurrent.*;"
            echo "import java.util.concurrent.atomic.*;"
            echo "import java.time.*;"
            echo "import java.io.*;"
            echo "import java.math.*;"
            echo ""
            # Challenge-specific imports (only inject what each pom.xml provides)
            case "${{ inputs.challenge_id }}" in
              3)
                echo "import jakarta.persistence.*;"
                echo "import org.springframework.data.jpa.repository.*;"
                echo "import org.springframework.data.repository.query.*;"
                echo ""
                ;;
              5)
                echo "import org.springframework.web.reactive.function.client.*;"
                echo "import io.github.resilience4j.circuitbreaker.annotation.*;"
                echo ""
                ;;
              6)
                echo "import org.springframework.security.config.annotation.web.builders.*;"
                echo "import org.springframework.security.config.http.*;"
                echo "import org.springframework.security.web.*;"
                echo "import org.springframework.security.web.authentication.*;"
                echo "import org.springframework.security.core.*;"
                echo "import org.springframework.security.core.context.*;"
                echo "import org.springframework.security.core.userdetails.*;"
                echo "import io.jsonwebtoken.*;"
                echo "import io.jsonwebtoken.security.*;"
                echo ""
                ;;
            esac
            echo "${{ inputs.candidate_code }}" | base64 -d \
              | sed '/^package /d' \
              | sed '/^import /d' \
              | sed 's/^public class /class /g' \
              | sed 's/^public interface /interface /g' \
              | sed 's/^public enum /enum /g'
          } > "$TARGET"
          echo "=== Injected: ${TARGET} ==="
          cat "$TARGET"

      - name: Run tests
        id: run_tests
        run: |
          cd challenge-tests/challenge-${{ inputs.challenge_id }}
          mvn test --no-transfer-progress 2>&1 | tee test_output.txt
        continue-on-error: true

      - name: Parse and report results
        run: |
          cd challenge-tests/challenge-${{ inputs.challenge_id }}

          echo "=== Test output (last 80 lines) ==="
          tail -80 test_output.txt

          # Primary: parse Surefire XML reports (most reliable)
          REPORT_DIR="target/surefire-reports"
          TESTS_RUN=0
          FAILURES=0
          ERRORS=0

          if ls "${REPORT_DIR}"/TEST-*.xml 2>/dev/null | head -1 | grep -q .; then
            TESTS_RUN=$(grep -h '<testsuite' "${REPORT_DIR}"/TEST-*.xml \
              | grep -oP 'tests="\K[0-9]+' | awk '{s+=$1} END {print s+0}')
            FAILURES=$(grep -h '<testsuite' "${REPORT_DIR}"/TEST-*.xml \
              | grep -oP 'failures="\K[0-9]+' | awk '{s+=$1} END {print s+0}')
            ERRORS=$(grep -h '<testsuite' "${REPORT_DIR}"/TEST-*.xml \
              | grep -oP 'errors="\K[0-9]+' | awk '{s+=$1} END {print s+0}')
            echo "Parsed from XML: tests=$TESTS_RUN failures=$FAILURES errors=$ERRORS"
          fi

          # Fallback: parse stdout summary line
          if [ "${TESTS_RUN}" -eq 0 ]; then
            TESTS_RUN=$(grep -oP 'Tests run: \K[0-9]+' test_output.txt | tail -1 || echo "0")
            FAILURES=$(grep -oP 'Failures: \K[0-9]+' test_output.txt | tail -1 || echo "0")
            ERRORS=$(grep -oP 'Errors: \K[0-9]+' test_output.txt | tail -1 || echo "0")
            echo "Parsed from stdout: tests=$TESTS_RUN failures=$FAILURES errors=$ERRORS"
          fi

          TESTS_RUN=${TESTS_RUN:-0}
          FAILURES=${FAILURES:-0}
          ERRORS=${ERRORS:-0}

          ACTUAL_PASSED=$(( TESTS_RUN - FAILURES - ERRORS ))
          if [ "${TESTS_RUN}" -gt 0 ]; then
            SCORE=$(( ACTUAL_PASSED * 100 / TESTS_RUN ))
          else
            SCORE=0
          fi

          RAW_OUTPUT=$(tail -100 test_output.txt | base64 -w 0 || echo "")

          echo "Tests: $TESTS_RUN, Passed: $ACTUAL_PASSED, Score: $SCORE"

          curl -s -X POST "${{ secrets.BACKEND_CALLBACK_URL }}/api/webhook/github" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: ${{ secrets.WEBHOOK_SECRET }}" \
            -d "{
              \"session_id\": \"${{ inputs.session_id }}\",
              \"challenge_id\": ${{ inputs.challenge_id }},
              \"deep_score\": ${SCORE},
              \"passed_count\": ${ACTUAL_PASSED},
              \"total_count\": ${TESTS_RUN},
              \"raw_output\": \"${RAW_OUTPUT}\"
            }" \
            && echo "Callback sent successfully" \
            || echo "Callback failed"
